<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database Columns Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#08060a; color:#f0d080; font-family:sans-serif; padding:40px; text-align:center;">

    <h2>جاري فحص أعمدة قاعدة البيانات الخاصة بك...</h2>
    <div id="result" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:10px; margin-top:20px; font-size:18px; white-space:pre-wrap; text-align:left; max-width:600px; margin-left:auto; margin-right:auto; color:#fff;"></div>

    <script>
        const SUPABASE_URL = 'https://lhixtovnrpkhzntbcmin.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_k-2_opzcB0o0GouWMxbOxQ_GifGcD_B';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function findColumns() {
            const resDiv = document.getElementById('result');
            try {
                // جلب صف واحد فقط لمعرفة أسماء الأعمدة بدقة
                const { data, error } = await sb.from('orders').select('*').limit(1);
                if (error) throw error;
                
                if (data && data.length > 0) {
                    const columns = Object.keys(data[0]);
                    resDiv.innerHTML = "💡 الأعمدة الموجودة في جدولك الحالي هي:\n\n" + columns.map(c => `• ${c}`).join('\n');
                } else {
                    // إذا كان الجدول فارغاً تماماً، نحاول إدخال بيانات فارغة لمعرفة الأعمدة المطلوبة من الإيرور
                    const { error: insertError } = await sb.from('orders').insert([{}]);
                    resDiv.textContent = "تفاصيل الجدول:\n" + JSON.stringify(insertError, null, 2);
                }
            } catch (err) {
                resDiv.textContent = "حدث خطأ أثناء الفحص:\n" + err.message;
            }
        }
        findColumns();
    </script>
</body>
</html>
