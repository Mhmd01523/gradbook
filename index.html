<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Grad Book — إنشاء دفتر تخرجك الفاخر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // إعدادات قاعدة البيانات الخاصة بك
  const SUPABASE_URL = 'https://lhixtovnrpkhzntbcmin.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_k-2_opzcB0o0GouWMxbOxQ_GifGcD_B';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dark: #7a5c10;
  --bg: #08060a;
  --bg2: #0e0b14;
  --text: #f5f0e8;
  --text2: rgba(245,240,232,0.55);
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(201,168,76,0.15);
}
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Tajawal', sans-serif; overflow-x:hidden; }

.container { max-width:500px; margin:0 auto; padding:40px 20px; }
.logo { text-align:center; font-family:'Cormorant Garamond', serif; font-size:32px; color:var(--gold-light); letter-spacing:4px; margin-bottom:10px; text-transform:uppercase; }
.subtitle { text-align:center; font-size:14px; color:var(--text2); margin-bottom:40px; }

form { background:var(--glass); border:1px solid var(--glass-border); padding:24px; border-radius:20px; display:flex; flex-direction:column; gap:20px; backdrop-filter:blur(10px); }
.input-group { display:flex; flex-direction:column; gap:8px; }
label { font-size:13px; color:var(--gold-light); font-weight:500; }
input, select { background:rgba(255,255,255,0.02); border:1px solid rgba(201,168,76,0.2); border-radius:12px; padding:14px; color:#fff; font-family:inherit; font-size:14px; transition:all 0.3s; }
input:focus, select:focus { outline:none; border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,0.15); }

/* تنسيق حقل الهاتف الروسي */
.phone-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
.country-code { position: absolute; left: 15px; color: var(--gold-light); font-weight: bold; direction: ltr; user-select: none; pointer-events: none; font-size: 15px; }
.phone-input { width: 100%; padding-left: 45px !important; direction: ltr !important; text-align: left !important; }

.file-zone { border:1px dashed rgba(201,168,76,0.3); padding:30px; text-align:center; border-radius:12px; cursor:pointer; background:rgba(201,168,76,0.01); transition:all 0.3s; }
.file-zone:hover { border-color:var(--gold); background:rgba(201,168,76,0.03); }
.file-zone span { font-size:13px; color:var(--text2); }
#file-input { display:none; }
.preview-thumbnails { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; margin-top:10px; }
.thumb { aspect-ratio:1; border-radius:8px; object-fit:cover; border:1px solid var(--gold); }

.submit-btn { background:linear-gradient(135deg, var(--gold), #a07830); color:#000; border:none; padding:16px; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; margin-top:10px; transition:all 0.3s; box-shadow:0 4px 20px rgba(201,168,76,0.2); }
.submit-btn:hover { transform:translateY(-2px); filter:brightness(1.1); box-shadow:0 6px 25px rgba(201,168,76,0.35); }
.submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* Loading Layer */
#loading-overlay { position:fixed; inset:0; background:rgba(8,6,10,0.9); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; gap:15px; }
.spinner { width:40px; height:40px; border:3px solid rgba(201,168,76,0.1); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

html[dir="ltr"] .country-code { left: 15px; }
html[dir="ltr"] .phone-input { padding-left: 45px !important; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="color:var(--gold-light); font-size:14px;" id="loading-text">جاري رفع الصور الفاخرة وإنشاء طلبك...</div>
</div>

<div class="container">
  <div class="logo">Grad Book</div>
  <div class="subtitle">صمم دفتر تخرجك الرقمي وعاينه فوراً قبل التفعيل</div>

  <form id="order-form" onsubmit="handleSubmit(event)">
    
    <!-- الاسم الكامل -->
    <div class="input-group">
      <label for="name">الاسم الكامل للخيّج/ة</label>
      <required><input type="text" id="name" required placeholder="اكتب اسمك الثلاثي أو الثنائي"></required>
    </div>

    <!-- الكلية / التخصص -->
    <div class="input-group">
      <label for="faculty">الكلية أو التخصص الجامعي</label>
      <input type="text" id="faculty" required placeholder="مثال: كلية الطب البشري">
    </div>

    <!-- سنة التخرج -->
    <div class="input-group">
      <label for="grad_year">سنة التخرج</label>
      <select id="grad_year" required>
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2027">2027</option>
      </select>
    </div>

    <!-- رقم الهاتف الروسي المطور -->
    <div class="input-group">
      <label for="phone">رقم الهاتف (الروسي)</label>
      <div class="phone-wrapper">
        <span class="country-code">+7</span>
        <input 
          type="tel" 
          id="phone" 
          required 
          placeholder="900 000-00-00" 
          inputmode="tel"
          pattern="[0-9]*"
          class="phone-input"
          oninput="validateRussianPhone(this)"
        >
      </div>
    </div>

    <!-- قسم رفع الصور -->
    <div class="input-group">
      <label>ألبوم صور الغلاف والمعرض (يمكنك رفع حتى 5 صور)</label>
      <div class="file-zone" onclick="document.getElementById('file-input').click()">
        <span>✨ اضغط هنا لاختيار صورك الفاخرة</span>
        <input type="file" id="file-input" multiple accept="image/*" onchange="previewImages(this)">
      </div>
      <div class="preview-thumbnails" id="thumbs-container"></div>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">إنشاء الدفتر ومعاينته حياً 🚀</button>
  </form>
</div>

<script>
let selectedFiles = [];

// كود ذكي لمنع كتابة الأحرف وإجبار الكيبورد الرقمي والتعامل مع الكود +7
function validateRussianPhone(input) {
  input.value = input.value.replace(/[^0-9]/g, '');
  if (input.value.startsWith('7')) {
    input.value = input.value.substring(1);
  }
}

function previewImages(input) {
  const container = document.getElementById('thumbs-container');
  container.innerHTML = '';
  selectedFiles = Array.from(input.files).slice(0, 5); // حد أقصى 5 صور
  
  selectedFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = e.target.result;
      container.appendChild(img);
    }
    reader.readAsDataURL(file);
  });
}

// توليد كود عشوائي فريد للطلب
function generateOrderCode() {
  return 'GRAD-' + Math.random().toString(36).substr(2, 9).toUpperCase();
}

async function handleSubmit(event) {
  event.preventDefault();
  const btn = document.getElementById('submit-btn');
  const overlay = document.getElementById('loading-overlay');
  
  btn.disabled = true;
  overlay.style.display = 'flex';

  const name = document.getElementById('name').value.trim();
  const faculty = document.getElementById('faculty').value.trim();
  const grad_year = document.getElementById('grad_year').value;
  
  // دمج رمز الدولة مع الرقم المكتوب ليرسل لـ Supabase كاملاً ومثالياً لقاعدة بياناتك
  const rawPhone = document.getElementById('phone').value.trim();
  const fullPhone = '+7' + rawPhone; 
  
  const orderCode = generateOrderCode();
  let uploadedUrls = [];

  try {
    // 1️⃣ رفع الصور إلى الـ Storage في Supabase إن وجدت
    if (selectedFiles.length > 0) {
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const fileExt = file.name.split('.').pop();
        const fileName = `${orderCode}_${i}_${Date.now()}.${fileExt}`;
        
        const { data, error } = await sb.storage
          .from('covers') // تأكد أن اسم الـ Bucket عندك هو covers ومفتوح للعامة Public
          .upload(fileName, file);

        if (error) throw error;

        const { data: urlData } = sb.storage
          .from('covers')
          .getPublicUrl(fileName);

        uploadedUrls.push(urlData.publicUrl);
      }
    }

    // 2️⃣ إدخال البيانات في جدول الـ orders
    const { error: insertError } = await sb
      .from('orders')
      .insert([{
        order_code: orderCode,
        name: name,
        full_name: name, // لحماية الكود القديم إن وجد
        faculty: faculty,
        grad_year: grad_year,
        phone: fullPhone, // يتم حفظ الرقم كاملاً مع +7 هنا
        cover_photos: uploadedUrls,
        status: 'pending'
      }]);

    if (insertError) throw insertError;

    // 3️⃣ التحويل التلقائي لصفحة المعاينة الفاخرة بعد النجاح
    window.location.href = `preview.html?order=${orderCode}`;

  } catch (err) {
    alert('حدث خطأ أثناء حفظ البيانات، يرجى المحاولة مرة أخرى: ' + err.message);
    console.error(err);
    btn.disabled = false;
    overlay.style.display = 'none';
  }
}
</script>
</body>
</html>
