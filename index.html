<style>
    body { background: #08060a; color: #f5f0e8; font-family: sans-serif; margin: 0; padding: 20px; }
    .order-wrap { max-width: 500px; margin: 50px auto; background: #1a1720; padding: 30px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.2); }
    .o-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2730; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
    .order-btn { width: 100%; padding: 15px; background: #c9a84c; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

<body>

<section id="hero">
    <div class="hero-badge" id="badge-text">...</div>
    <h1 class="hero-title"><span id="title-line1">Grad Book</span><br><span id="title-line2">...</span></h1>
    <p id="hero-sub-text">...</p>
    <button class="cta-btn" id="cta-text">...</button>
</section>

<section id="order" class="order-wrap">
    <div class="o-field">
        <div id="lbl-name">Full Name</div>
        <input class="o-input" id="o-name" type="text">
    </div>
    <div class="o-field">
        <div id="lbl-tg">Phone</div>
        <input class="o-input" id="o-tg" type="tel" value="+7" onfocus="if(this.value=='')this.value='+7'">
    </div>
    <div class="o-field">
        <div id="lbl-faculty">Faculty</div>
        <select class="o-input" id="o-faculty">
            <option value="general">Лечебный факультет / General Medicine / كلية الطب البشري</option>
            <option value="dental">Стоматологический факультет / Dentistry / كلية طب الأسنان</option>
            <option value="pharmacy">Фармацевтический факультет / Pharmacy / كلية الصيدلة</option>
        </select>
    </div>
    <div class="o-field">
        <div id="lbl-year">Year</div>
        <input class="o-input" type="text" value="2026" readonly>
    </div>
    <input type="hidden" id="o-lang" value="en">
    <button class="order-btn" id="order-btn" onclick="submitOrder()">
        <span id="order-btn-text">Generate</span>
    </button>
</section>

<script>
    function submitOrder() {
        const data = {
            name: document.getElementById('o-name').value,
            tg: document.getElementById('o-tg').value,
            faculty: document.getElementById('o-faculty').value,
            year: '2026',
            lang: document.getElementById('o-lang').value
        };
        sessionStorage.setItem('grad_data', JSON.stringify(data));
        window.location.href = 'preview.html';
    }
</script>
</body>
