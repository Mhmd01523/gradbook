<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://lhixtovnrpkhzntbcmin.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_k-2_opzcB0o0GouWMxbOxQ_GifGcD_B';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <style>
        /* إجبار الخلفية والألوان على مستوى جذر الصفحة بالكامل */
        * { margin: 0 !important; padding: 0 !important; box-sizing: border-box !important; }
        :root {
            --gold: #c9a84c !important;
            --gold-light: #f0d080 !important;
            --bg: #08060a !important;
            --text: #f5f0e8 !important;
        }
        html, body { 
            background-color: #08060a !important; 
            background: #08060a !important;
            color: #f5f0e8 !important; 
            font-family: 'Tajawal', sans-serif !important; 
            min-height: 100vh !important;
            width: 100% !important;
        }
        html[dir="rtl"] label, html[dir="rtl"] input, html[dir="rtl"] select { text-align: right !important; }
        html[dir="rtl"] .country-code { left: auto !important; right: 15px !important; }
        html[dir="rtl"] .phone-input { padding-left: 15px !important; padding-right: 45px !important; text-align: right !important; }
        
        .container { max-width: 600px !important; margin: 0 auto !important; padding: 60px 24px !important; display: block !important; }
        .logo-area { text-align: center !important; margin-bottom: 50px !important; display: block !important; }
        .logo { font-family: 'Cormorant Garamond', serif !important; font-size: 46px !important; font-weight: 300 !important; color: #f0d080 !important; letter-spacing: 7px !important; text-transform: uppercase !important; margin-bottom: 14px !important; }
        .subtitle { font-size: 14px !important; color: rgba(245,240,232,0.55) !important; letter-spacing: 1px !important; font-weight: 400 !important; line-height: 1.6 !important; }
        
        /* تلوين الاستمارة بالكامل باللون الداكن الفخم */
        #order-form { 
            background: #120e16 !important; 
            background-color: #120e16 !important;
            border: 1px solid rgba(201,168,76,0.2) !important; 
            padding: 35px !important; 
            border-radius: 28px !important; 
            display: flex !important; 
            flex-direction: column !important; 
            gap: 26px !important; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8) !important;
            margin-top: 20px !important;
        }
        .input-group { display: flex !important; flex-direction: column !important; gap: 10px !important; width: 100% !important; }
        label { font-size: 13px !important; color: #f0d080 !important; font-weight: 700 !important; text-align: left !important; letter-spacing: 0.5px !important; text-transform: uppercase !important; display: block !important; }
        
        input, select { 
            background: rgba(255,255,255,0.03) !important; 
            background-color: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(201,168,76,0.2) !important; 
            border-radius: 16px !important; 
            padding: 18px !important; 
            color: #ffffff !important; 
            font-family: inherit !important; 
            font-size: 15px !important; 
            width: 100% !important; 
            text-align: left !important;
            display: block !important;
        }
        input:focus, select:focus { outline: none !important; border-color: #c9a84c !important; box-shadow: 0 0 15px rgba(201,168,76,0.3) !important; }
        option { background: #141118 !important; color: #fff !important; }
        
        .phone-wrapper { position: relative !important; display: flex !important; align-items: center !important; width: 100% !important; }
        .country-code { position: absolute !important; left: 15px !important; color: #f0d080 !important; font-weight: bold !important; direction: ltr !important; font-size: 15px !important; z-index: 10 !important; }
        .phone-input { width: 100% !important; padding-left: 45px !important; direction: ltr !important; text-align: left !important; }
        
        .file-zone { border: 1px dashed rgba(201,168,76,0.4) !important; padding: 45px 24px !important; text-align: center !important; border-radius: 18px !important; cursor: pointer !important; background: rgba(201,168,76,0.03) !important; display: flex !important; flex-direction: column !important; align-items: center !important; gap: 12px !important; }
        .file-icon { width: 52px !important; height: 52px !important; border-radius: 50% !important; background: rgba(201,168,76,0.1) !important; display: flex !important; align-items: center !important; justify-content: center !important; color: #f0d080 !important; font-size: 24px !important; }
        .file-text-main { font-size: 14px !important; color: #fff !important; font-weight: 500 !important; }
        .file-text-sub { font-size: 11px !important; color: rgba(245,240,232,0.55) !important; }
        #file-input { display: none !important; }
        
        .preview-thumbnails { display: grid !important; grid-template-columns: repeat(5, 1fr) !important; gap: 10px !important; margin-top: 14px !important; width: 100% !important; }
        .thumb { width: 100% !important; aspect-ratio: 1 / 1 !important; max-height: 70px !important; border-radius: 12px !important; object-fit: cover !important; border: 1px solid rgba(201,168,76,0.4) !important; }
        
        .submit-btn { 
            background: linear-gradient(135deg, #c9a84c, #a07830) !important; 
            color: #000000 !important; 
            border: none !important; 
            padding: 18px !important; 
            border-radius: 16px !important; 
            font-size: 16px !important; 
            font-weight: 700 !important; 
            cursor: pointer !important; 
            margin-top: 15px !important; 
            width: 100% !important; 
            box-shadow: 0 6px 25px rgba(201,168,76,0.3) !important; 
            display: block !important;
        }
        
        #loading-overlay { position: fixed !important; inset: 0 !important; background: rgba(8,6,10,0.96) !important; z-index: 9999 !important; display: none !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; gap: 20px !important; }
        .spinner { width: 45px !important; height: 45px !important; border: 3px solid rgba(201,168,76,0.1) !important; border-top-color: #c9a84c !important; border-radius: 50% !important; animation: spin 1s linear infinite !important; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text" style="color:#f0d080; font-size:15px;">Creating your digital album...</div>
</div>

<div class="container">
    <div class="logo-area">
        <div class="logo">Grad Book</div>
        <div class="subtitle" id="sub-title">Design your digital album and preview it instantly</div>
    </div>

    <form id="order-form" onsubmit="handleSubmit(event)">
        <div class="input-group">
            <label id="lbl-name" for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label id="lbl-faculty" for="faculty">Faculty / Specialty</label>
            <select id="faculty" required></select>
        </div>

        <div class="input-group">
            <label id="lbl-year" for="grad_year">Graduation Year</label>
            <select id="grad_year" required>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2027">2027</option>
            </select>
        </div>

        <div class="input-group">
            <label id="lbl-phone" for="phone">Phone Number (RU)</label>
            <div class="phone-wrapper">
                <span class="country-code">+7</span>
                <input type="tel" id="phone" required placeholder="900 000-00-00" inputmode="tel" class="phone-input" oninput="validateRussianPhone(this)">
            </div>
        </div>

        <div class="input-group">
            <label id="lbl-photos">Album Cover & Gallery Photos</label>
            <div class="file-zone" onclick="document.getElementById('file-input').click()">
                <div class="file-icon">+</div>
                <div class="file-text-main" id="upload-status">Click here to upload photos</div>
                <div class="file-text-sub" id="upload-sub">You can upload up to 5 high-quality photos</div>
                <input type="file" id="file-input" multiple accept="image/*" onchange="previewImages(this)">
            </div>
            <div class="preview-thumbnails" id="thumbs-container"></div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Create & Preview Album 🚀</button>
    </form>
</div>

<script>
const translations = {
    ru: {
        dir: "ltr", subtitle: "Создайте свой цифровой альбом и просмотрите его перед активацией", lblName: "ФИО Выпускника", phName: "Введите ваше полное имя", lblFaculty: "Факультет / Специальность", lblYear: "Год выпуска", lblPhone: "Номер телефона (РФ)", lblPhotos: "Фотографии для обложки и галереи", uploadMain: "Нажмите здесь, чтобы загрузить фото", uploadSub: "Вы можете загрузить до 5 фотографий", btnSubmit: "Создать и просмотреть альбом 🚀", loading: "Создаем ваш цифровой альбом...", faculties: [{ val: "كلية الطب العام", text: "Лечебное дело (Общая медицина)" }, { val: "كلية طب الأسنان", text: "Стоматологический факультет" }, { val: "كلية الصيدلة", text: "Фармацевтический факультет" }], selectFaculty: "Выберите факультет...", successSelect: "✅ Выбрано фото: ", errorMsg: "Ошибка: "
    },
    ar: {
        dir: "rtl", subtitle: "صمم دفتر تخرجك الرقمي وعاينه فوراً قبل التفعيل", lblName: "الاسم الكامل للخريج/ة", phName: "اكتب اسمك الثلاثي أو الثنائي", lblFaculty: "الكلية أو التخصص الجامعي", lblYear: "سنة التخرج", lblPhone: "رقم الهاتف (الروسي)", lblPhotos: "ألبوم صور الغلاف والمعرض", uploadMain: "اضغط هنا لاختيار صورك الفاخرة", uploadSub: "يمكنك رفع حتى 5 صور بصيغة عالية الجودة", btnSubmit: "إنشاء الدفتر ومعاينته حياً 🚀", loading: "جاري رفع صورك الفاخرة وإنشاء ألبومك...", faculties: [{ val: "كلية الطب العام", text: "كلية الطب العام" }, { val: "كلية طب الأسنان", text: "كلية طب الأسنان" }, { val: "كلية الصيدلة", text: "كلية الصيدلة" }], selectFaculty: "اختر الكلية من هنا...", successSelect: "✅ تم اختيار صور بنجاح: ", errorMsg: "حدث خطأ: "
    },
    en: {
        dir: "ltr", subtitle: "Design your digital album and preview it instantly", lblName: "Full Name", phName: "Enter your full name", lblFaculty: "Faculty / Specialty", lblYear: "Graduation Year", lblPhone: "Phone Number (RU)", lblPhotos: "Album Cover & Gallery Photos", uploadMain: "Click here to upload photos", uploadSub: "You can upload up to 5 high-quality photos", btnSubmit: "Create & Preview Album 🚀", loading: "Creating your digital album...", faculties: [{ val: "كلية الطب العام", text: "General Medicine" }, { val: "كلية طب الأسنان", text: "Faculty of Dentistry" }, { val: "كلية الصيدلة", text: "Faculty of Pharmacy" }], selectFaculty: "Select faculty...", successSelect: "✅ Selected photos: ", errorMsg: "An error occurred: "
    }
};

let currentLang = 'en';
const userLang = navigator.language || navigator.userLanguage;
const langCode = userLang.substring(0, 2).toLowerCase();
if (translations[langCode]) currentLang = langCode;

const lang = translations[currentLang];
document.documentElement.lang = currentLang;
document.documentElement.dir = lang.dir;
document.getElementById('sub-title').textContent = lang.subtitle;
document.getElementById('lbl-name').textContent = lang.lblName;
document.getElementById('name').placeholder = lang.phName;
document.getElementById('lbl-faculty').textContent = lang.lblFaculty;
document.getElementById('lbl-year').textContent = lang.lblYear;
document.getElementById('lbl-phone').textContent = lang.lblPhone;
document.getElementById('lbl-photos').textContent = lang.lblPhotos;
document.getElementById('upload-status').textContent = lang.uploadMain;
document.getElementById('upload-sub').textContent = lang.uploadSub;
document.getElementById('submit-btn').textContent = lang.btnSubmit;
document.getElementById('loading-text').textContent = lang.loading;

const facultySelect = document.getElementById('faculty');
let facultyOptions = `<option value="" disabled selected>${lang.selectFaculty}</option>`;
lang.faculties.forEach(f => { facultyOptions += `<option value="${f.val}">${f.text}</option>`; });
facultySelect.innerHTML = facultyOptions;

let selectedFiles = [];

function validateRussianPhone(input) {
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value.startsWith('7')) input.value = input.value.substring(1);
}

function previewImages(input) {
    const container = document.getElementById('thumbs-container');
    const statusText = document.getElementById('upload-status');
    container.innerHTML = '';
    selectedFiles = Array.from(input.files).slice(0, 5);
    
    if(selectedFiles.length > 0) {
        statusText.innerHTML = `${lang.successSelect} <span style="color:#f0d080; font-weight:700;">${selectedFiles.length}</span>`;
    } else {
        statusText.textContent = lang.uploadMain;
    }
    
    selectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement('img');
            img.className = 'thumb';
            img.src = e.target.result;
            container.appendChild(img);
        }
        reader.readAsDataURL(file);
    });
}

async function handleSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submit-btn');
    const overlay = document.getElementById('loading-overlay');
    
    btn.disabled = true;
    overlay.style.display = 'flex';

    const nameValue = document.getElementById('name').value.trim();
    const faculty = document.getElementById('faculty').value;
    const grad_year = document.getElementById('grad_year').value;
    const rawPhone = document.getElementById('phone').value.trim();
    const fullPhone = '+7' + rawPhone; 
    const orderCode = 'GRAD-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    let uploadedUrls = [];

    try {
        if (selectedFiles.length > 0) {
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const fileExt = file.name.split('.').pop();
                const fileName = `${orderCode}_${i}_${Date.now()}.${fileExt}`;
                const { data, error } = await sb.storage.from('covers').upload(fileName, file);
                if (error) throw error;
                const { data: urlData } = sb.storage.from('covers').getPublicUrl(fileName);
                uploadedUrls.push(urlData.publicUrl);
            }
        }

        let orderPayload = {
            order_code: orderCode,
            status: 'pending',
            customer_name: nameValue,
            customer_telegram: fullPhone,
            faculty: faculty,
            grad_year: grad_year,
            lang: currentLang,
            cover_photos: uploadedUrls,
            cover_photo_url: uploadedUrls.length > 0 ? uploadedUrls[0] : null
        };

        const { error: insertError } = await sb.from('orders').insert([orderPayload]);
        if (insertError) throw insertError;

        window.location.href = `preview.html?order=${orderCode}`;

    } catch (err) {
        alert(lang.errorMsg + err.message);
        btn.disabled = false;
        overlay.style.display = 'none';
    }
}
</script>
</body>
</html>
