<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --bg: #08060a;
  --bg2: #0e0b14;
  --card-bg: rgba(255,255,255,0.03);
  --border: rgba(201,168,76,0.15);
  --text: #f5f0e8;
  --text2: rgba(245,240,232,0.6);
}
html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Tajawal', sans-serif; overflow-x:hidden; }

/* ══ SCREEN SETUP ══ */
.main-container { max-width:540px; margin:0 auto; padding:40px 16px 80px; }
.logo-area { text-align:center; margin-bottom:30px; font-family:'Cormorant Garamond', serif; font-size:24px; color:var(--gold-light); letter-spacing:4px; font-weight:600; }

/* ══ LOADING ══ */
#loading-screen {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  transition:opacity 0.5s ease;
}
#loading-screen.fade-out { opacity:0; pointer-events:none; }
.spinner { width:40px; height:40px; border:3px solid rgba(201,168,76,0.1); border-top:3px solid var(--gold); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ══ INVOICE CARD ══ */
.invoice-card {
  background:linear-gradient(145deg, var(--bg2), #15111e);
  border: 1px solid var(--border);
  border-radius:24px;
  padding:24px;
  margin-bottom:24px;
  position:relative;
  overflow:hidden;
  box-shadow: 0 20px 45px rgba(0,0,0,0.5);
}
.invoice-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}
.invoice-header { display:flex; justify-content:between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.06); padding-bottom:14px; margin-bottom:16px; }
.inv-title { font-size:14px; color:var(--gold-light); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.inv-code { font-size:12px; font-family:monospace; color:var(--text2); }

.inv-row { display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px; }
.inv-lbl { color:var(--text2); }
.inv-val { color:#fff; font-weight:500; }
.inv-val.name-highlight { font-family:'Amiri', serif; font-size:18px; font-weight:700; color:var(--gold-light); }

.inv-total-row { display:flex; justify-content:space-between; align-items:center; border-top:1px dashed rgba(201,168,76,0.25); padding-top:16px; margin-top:16px; }
.total-lbl { font-size:16px; font-weight:700; color:#fff; }
.total-val { font-size:26px; font-weight:900; color:var(--gold); font-family:'Cormorant Garamond', serif; }

/* ══ GATEWAY SECTION ══ */
.pay-methods-title { font-size:12px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin:32px 0 12px; font-weight:700; text-align:center; }
.gateways-grid { display:flex; flex-direction:column; gap:12px; }
.pay-btn {
  width:100%; padding:18px;
  background:var(--card-bg);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  color:#fff; font-size:15px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.pay-btn:hover { border-color:var(--gold); background:rgba(201,168,76,0.04); transform:translateY(-1px); }

.pay-btn-inner { display:flex; align-items:center; gap:12px; }
.pay-icon { font-size:20px; }
.pay-arrow { font-size:14px; opacity:0.3; transition:transform 0.3s; }
.pay-btn:hover .pay-arrow { opacity:1; transform:translateX(3px); }
html[dir="rtl"] .pay-btn:hover .pay-arrow { transform:translateX(-3px); }

/* Apple pay special brand styling */
.pay-btn.apple-pay { background:#fff; color:#000; border:none; }
.pay-btn.apple-pay:hover { background:#f5f5f7; opacity:0.95; transform:scale(1.01); }
.pay-btn.apple-pay .pay-arrow { color:#000; }

/* ══ SUCCESS & TG SECTION ══ */
.success-card {
  background:linear-gradient(145deg, #09140e, #0e2016);
  border:1px solid rgba(39,174,96,0.3);
  border-radius:24px; padding:32px 24px; text-align:center;
  animation:scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
@keyframes scaleIn { from{transform:scale(0.9); opacity:0;} to{transform:scale(1); opacity:1;} }
.success-icon { font-size:54px; margin-bottom:16px; display:inline-block; animation:bounce 1s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-6px)} }
.success-title { font-size:22px; font-weight:900; color:#27ae60; margin-bottom:8px; }
.success-desc { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; margin-bottom:24px; }

.btn-telegram {
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  width:100%; max-width:320px; padding:16px 24px;
  background:#2481cc; color:#fff; border:none; border-radius:50px;
  font-size:15px; font-weight:700; cursor:pointer; text-decoration:none;
  box-shadow:0 8px 24px rgba(36,129,204,0.3); transition:all 0.3s;
}
.btn-telegram:hover { background:#288ecc; transform:translateY(-2px); box-shadow:0 12px 30px rgba(36,129,204,0.5); }
.tg-icon { font-size:18px; }

#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(201,168,76,0.95); color:#000; padding:10px 24px;
  border-radius:50px; font-size:13px; font-weight:700; z-index:9999;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
#toast.show { opacity:1; }
</style>

<script>
// ══════════════ TRANSLATIONS (7 LANGUAGES) ══════════════
const translations = {
  ar: {
    inv_title: "تفاصيل الفاتورة الرقمية", inv_name: "اسم الخريج:",
    inv_product: "المنتج الباقة:", inv_status: "حالة السداد:",

    paying_loader: "Обработка платежа...", paid_success_title: "Оплата успешна! 🎉",
    paid_success_desc: "Поздравляем! Ваша выпускная система успешно скомпилирована. Нажмите кнопку ниже, чтобы запустить Telegram-бота и управлять поздравлениями.",
    btn_tg_text: "Запустить Telegram-бота сейчас"
  },
  fr: {
    inv_title: "Détails de la Facture Numérique", inv_name: "Nom du Diplômé:",
    inv_product: "Formule Choisie:", inv_status: "Statut du Paiement:",
    inv_total: "Montant Total Dû:", pay_title: "Sélectionnez une Méthode Sécurisée",

  },

    inv_product: "Plan de Paquete:", inv_status: "Estado del Pago:",
    inv_total: "Monto Total Debido:", pay_title: "Seleccione un Método Seguro",
    product_desc: "Libro Digital Premium + Bot Dedicado", status_pending: "Esperando Pago",
    paying_loader: "Procesando transacción segura...", paid_success_title: "¡Pago Completado! 🎉",
    paid_success_desc: "¡Felicitaciones! Su sistema de graduación ha sido compilado. Presione abajo para abrir Telegram y activar el bot automatizado.",

  },

    inv_total: "应付总金额:", pay_title: "选择安全的支付方式",
    product_desc: "高级数字化纪念册 + 专属机器人", status_pending: "等待付款",
    paying_loader: "安全支付交易处理中...", paid_success_title: "支付成功！🎉",
    paid_success_desc: "恭喜！您的毕业全套系统已顺利激活。请点击下方按钮直接打开Telegram并运行专属机器人来收集祝福。",
    btn_tg_text: "立即运行并激活Telegram机器人"
  },
  pt: {
    inv_title: "Detalhes da Fatura Digital", inv_name: "Nome do Graduado:",
    inv_product: "Plano Escolhido:", inv_status: "Status do Pagamento:",
    inv_total: "Total a Pagar:", pay_title: "Selecione o Método de Pagamento",
    product_desc: "Livro Digital Premium + Bot Dedicado", status_pending: "Aguardando Pagamento",
    paying_loader: "Processando transação segura...", paid_success_title: "Pagamento Concluído! 🎉",
    paid_success_desc: "Parabéns! Seu sistema de formatura foi compilado e ativado. Clique abaixo para abrir o Telegram e inicializar o seu bot gerenciador.",
    btn_tg_text: "Iniciar Bot do Telegram Agora"
  }
};

let currentLang = 'ar';
let orderCode = '';
let supabaseClient = null;

window.addEventListener('DOMContentLoaded', async () => {
  // 1. استخراج الـ Language والـ Order Code من الرابط
  const params = new URLSearchParams(window.location.search);
  currentLang = params.get('lang') || 'ar';
  if(!translations[currentLang]) currentLang = 'ar';
  orderCode = params.get('order') || '';

  // ضبط اتجاه محاذاة الصفحة
  if(['ar'].includes(currentLang)) {
    document.documentElement.dir = 'rtl';
    document.documentElement.lang = 'ar';
  } else {
    document.documentElement.dir = 'ltr';
    document.documentElement.lang = currentLang;
  }

  // تطبيق الترجمة النصية للمصفوفة
  applyLocalization();

  // تهيئة اتصال Supabase لجلب البيانات الحية وتحديث السجلات
  if(typeof supabase !== 'undefined') {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }

  // 2. تعبئة البيانات الحية
  await fetchInvoiceData();

  // إخفاء الشاشة الترحيبية للتحميل
  const loader = document.getElementById('loading-screen');
  if(loader) loader.classList.add('fade-out');
});

function applyLocalization() {
  const t = translations[currentLang];
  document.getElementById('lbl-inv-title').textContent = t.inv_title;
  document.getElementById('lbl-inv-name').textContent = t.inv_name;
  document.getElementById('lbl-inv-product').textContent = t.inv_product;
  document.getElementById('lbl-inv-status').textContent = t.inv_status;
  document.getElementById('lbl-inv-total').textContent = t.inv_total;
  document.getElementById('lbl-pay-title').textContent = t.pay_title;
  
  document.getElementById('view-product-lbl').textContent = t.product_desc;
  document.getElementById('view-status-lbl').textContent = t.status_pending;
}

async function fetchInvoiceData() {
  document.getElementById('view-order-code').textContent = orderCode ? `#${orderCode}` : '#------';
  
  // محاولة السحب الأولية الفورية للسرعة من الـ Session Storage
  let gradName = sessionStorage.getItem('grad_name');
  if(gradName) {
    document.getElementById('view-grad-name').textContent = gradName;
  }

  // السحب الأساسي والمؤكد من قاعدة بيانات Supabase
  if(supabaseClient && orderCode) {
    try {
      const { data, error } = await supabaseClient
        .from('orders')
        .select('name, price, status')
        .eq('order_code', orderCode)
        .single();
        
      if(data) {
        document.getElementById('view-grad-name').textContent = data.name;
        if(data.price) {
          document.getElementById('view-total-price').textContent = `${parseFloat(data.price).toFixed(2)} USD`;
        }
        // لو العميل كان قد سدد بالفعل سابقاً، نظهر له واجهة النجاح فوراً
        if(data.status === 'paid') {
          showPaidState();
        }
      }
    } catch(e) {
      console.error("Error reading order from DB", e);
    }
  }
}

async function simulatePayment(method) {
  const loader = document.getElementById('loading-screen');
  const t = translations[currentLang];
  
  // إظهار شاشة الانتظار للمعالجة
  if(loader) {
    loader.classList.remove('fade-out');
  }
  
  // محاكاة الاتصال البنكي الآمن لمدة ثانيتين
  setTimeout(async () => {
    // تحديث الحالة برمجياً في قاعدة بيانات Supabase إلى مدفوع "paid"
    if(supabaseClient && orderCode) {
      try {
        await supabaseClient
          .from('orders')
          .update({ status: 'paid' })
          .eq('order_code', orderCode);
      } catch(err) {
        console.error("Failed to update status on DB", err);
      }
    }

    // إخفاء الـ Loader وإظهار شاشة النجاح
    if(loader) loader.classList.add('fade-out');
    showPaidState();
    toast("✓ Secured via Grad Pay");
  }, 2000);
}

function showPaidState() {
  const t = translations[currentLang];
  
  // 1. إخفاء البوابات
  document.getElementById('payment-methods-section').style.display = 'none';
  
  // 2. تحديث نص الحالة في الكرت العلوي
  const statusLbl = document.getElementById('view-status-lbl');
  statusLbl.textContent = currentLang === 'ar' ? "✓ مدفوعة بالكامل" : "✓ Paid & Secured";
  statusLbl.style.color = '#27ae60';
  
  // 3. بناء لوحة النجاح وزر الانتقال لبوت التيليجرام
  // يرجى استبدال معرف البوت بالمعرف المخصص لمشروعك عند تفعيله نهائياً
  const botUsername = "GradBookRobot"; 
  const telegramUrl = `https://t.me/${botUsername}?start=${orderCode}`;

  const successContainer = document.getElementById('success-section');
  successContainer.style.display = 'block';
  successContainer.innerHTML = `
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h3 class="success-title">${t.paid_success_title}</h3>
      <p class="success-desc">${t.paid_success_desc}</p>
      <a href="${telegramUrl}" target="_blank" class="btn-telegram">
        <span class="tg-icon">✈</span>
        <span>${t.btn_tg_text}</span>
      </a>
    </div>
  `;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
