    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    header { text-align: center; margin-bottom: 32px; }

    /* ══ CARD SUMMARY ══ */
    .invoice-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; }

    .invoice-lbl { font-size: 13px; color: var(--text-muted); }
    .invoice-val { font-size: 14px; font-weight: 500; color: #fff; }
    .total-row { border-top: 1px dashed var(--border); border-bottom: none; margin-top: 12px; padding-top: 16px; }
    .total-lbl { font-size: 16px; font-weight: 700; color: var(--gold-light); }
    .total-val { font-size: 24px; font-weight: 900; color: var(--gold-light); font-family: monospace; }
    .status-badge { background: rgba(201,168,76,0.1); color: var(--gold); padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; border: 1px solid rgba(201,168,76,0.2); }
    
    /* ══ PAYMENT GATEWAYS ══ */

    .gate-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: right; width: 100%; position: relative; overflow: hidden; }
    .gate-btn:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.1); }
    .gate-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    .gate-info { display: flex; align-items: center; gap: 14px; }
    .gate-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.03); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .gate-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .gate-desc { font-size: 11px; color: var(--text-muted); }
    .radio-dot { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    .gate-btn.active .radio-dot { border-color: var(--gold); }
    .gate-btn.active .radio-dot::after { content: ''; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
    
    /* ══ PAY BUTTON ══ */
    .btn-submit { background: var(--gold); color: #0a0810; border: none; width: 100%; padding: 16px; border-radius: 16px; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 900; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 24px rgba(201,168,76,0.25); }

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  orderCode = params.get('order') || "";
  currentLang = params.get('lang') || "ar";
  if(!translations[currentLang]) currentLang = "ar";

  applyLocalization();

  if (typeof supabase !== 'undefined') {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }

  fetchInvoiceDetails();
});

function applyLocalization() {
  const t = translations[currentLang];
  
  if(currentLang === 'ar') {
    document.documentElement.dir = "rtl";
    document.documentElement.lang = "ar";
  } else {
    document.documentElement.dir = "ltr";
    document.documentElement.lang = currentLang;
  }

  document.getElementById('view-subtitle').textContent = t.subtitle;
  document.getElementById('lbl-student').textContent = t.student;
  document.getElementById('lbl-faculty').textContent = t.faculty;
  document.getElementById('lbl-order-id').textContent = t.order_id;
  document.getElementById('lbl-status').textContent = t.status;
  document.getElementById('view-status-lbl').textContent = t.status_pending;
  document.getElementById('lbl-total').textContent = t.total;
  document.getElementById('lbl-select-method').textContent = t.select_method;
  document.getElementById('desc-applepay').textContent = t.desc_apple;
  document.getElementById('desc-mada').textContent = t.desc_card;
  document.getElementById('btn-pay-text').textContent = t.btn_pay;
}

async function fetchInvoiceDetails() {
  if(!orderCode) {
    showErrorState();
    return;
  }

  toggleLoader(true, translations[currentLang].loader_init);

  try {
    const { data: order, error } = await supabaseClient
      .from('orders')
      .select('*')
      .eq('order_code', orderCode)
      .single();

    toggleLoader(false);

    if (error || !order) {
      showErrorState();
      return;
    }

    document.getElementById('view-name').textContent = order.name || order.customer_name || "——";
    document.getElementById('view-faculty').textContent = order.faculty || "——";
    document.getElementById('view-code').textContent = `#${order.order_code}`;

    if(order.status === 'paid') {
      showPaidState();
    }

  } catch(e) {
    console.error(e);
    toggleLoader(false);
    showErrorState();
  }
}

function selectMethod(method, element) {
  selectedGateway = method;
  document.querySelectorAll('.gate-btn').forEach(b => b.classList.remove('active'));
  element.classList.add('active');
}

function processPayment() {
  toggleLoader(true, translations[currentLang].loader_proc);

  setTimeout(async () => {
    try {
      // تحديث حالة الطلب في قاعدة البيانات إلى مدفوع (paid) تلقائياً عند نجاح العملية المحاكاة
      if(supabaseClient && orderCode) {
        await supabaseClient
          .from('orders')
          .update({ status: 'paid' })
          .eq('order_code', orderCode);
      }
      
      toggleLoader(false);
      showPaidState();
      toast(currentLang === 'ar' ? "✓ تم التشفير والقبول عبر Grad Pay" : "✓ Secured via Grad Pay");
    } catch (err) {
      console.error(err);
      toggleLoader(false);
      showPaidState(); 
    }
  }, 2000);
}

  statusLbl.style.background = 'rgba(39,174,96,0.1)';
  statusLbl.style.borderColor = 'rgba(39,174,96,0.2)';
  
  // يوزر البوت الفعلي الخاص بك تم ربطه بنجاح هنا
  const botUsername = "gradbook_notifications_bot"; 
  const telegramUrl = `https://t.me/${botUsername}?start=${orderCode}`;

  const successContainer = document.getElementById('success-section');
  successContainer.style.display = 'block';
  successContainer.innerHTML = `
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h3 class="success-title">${t.paid_success_title}</h3>
      <p class="success-desc">${t.paid_success_desc}</p>
      <a href="${telegramUrl}" target="_blank" class="btn-telegram">
        <span>${t.btn_tg}</span>
      </a>
    </div>
  `;
}

function showErrorState() {
  toast(translations[currentLang].err_not_found);
  document.getElementById('payment-methods-section').style.display = 'none';
}

function toggleLoader(show, text = "") {
  const el = document.getElementById('payment-loader');
  const txtEl = document.getElementById('loader-msg');
  if(text) txtEl.textContent = text;
  if(show) el.classList.add('active');
  else el.classList.remove('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

</body>
